name: 4B
options:
  bundleIdPrefix: com.carolinacherry
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    branch: main
targets:
  4B:
    type: application
    platform: iOS
    sources:
      - Sources/NineB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.carolinacherry.4B
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        SWIFT_EMIT_LOC_STRINGS: "YES"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "4B uses the microphone for voice input to chat."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "4B uses on-device speech recognition to convert your voice to text."
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
    entitlements:
      path: 4B.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
